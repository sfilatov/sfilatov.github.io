<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Race – 3rd Person</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }

    /* ── Start overlay ── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.88); color: #fff; z-index: 10;
    }
    #overlay h1 {
      font-size: 96px; font-weight: 900; color: #FF1801;
      text-shadow: 0 0 40px #FF1801aa; letter-spacing: 12px;
    }
    #overlay p { font-size: 18px; color: #aaa; margin: 12px 0 40px; letter-spacing: 3px; }
    #startBtn {
      padding: 15px 64px; font-size: 20px; font-weight: bold;
      background: #FF1801; color: #fff; border: none; border-radius: 4px;
      cursor: pointer; letter-spacing: 4px; text-transform: uppercase;
      transition: transform .15s, background .15s;
    }
    #startBtn:hover { background: #ff5030; transform: scale(1.06); }
    #overlay small { margin-top: 28px; color: #555; font-size: 12px; }

    /* ── HUD ── */
    #hud {
      display: none; position: absolute; bottom: 24px; right: 24px;
      color: #fff; text-align: right; pointer-events: none; user-select: none;
    }
    #livesRow {
      font-size: 28px; line-height: 1; margin-bottom: 6px;
      letter-spacing: 6px;
    }
    .life-full  { color: #FF1801; text-shadow: 0 0 8px #FF1801aa; }
    .life-empty { color: #333; }
    #gearNum {
      font-size: 80px; line-height: 1; font-weight: 900; color: #FF4444;
      text-shadow: 0 0 20px #FF4444cc;
    }
    #speedNum { font-size: 52px; font-weight: 700; color: #FFD700; text-shadow: 0 0 12px #FFD700aa; }
    #speedUnit { font-size: 13px; color: #aaa; margin-top: -4px; }
    #rpmTrack {
      width: 220px; height: 10px; background: rgba(255,255,255,.15);
      border-radius: 5px; margin-top: 10px; overflow: hidden;
    }
    #rpmFill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00ff88, #ffff00 60%, #ff4444);
      border-radius: 5px;
    }
    #rpmLabel { font-size: 10px; color: #555; margin-top: 3px; }
    #lapCount {
      font-size: 18px; font-weight: 700; color: #fff;
      margin-top: 10px; letter-spacing: 2px;
    }
    #lapCount span { color: #FFD700; text-shadow: 0 0 10px #FFD700aa; }

    /* ── Track switch notification ── */
    #trackNotif {
      display: none; position: absolute; top: 38%; left: 50%;
      transform: translateX(-50%);
      font-size: 58px; font-weight: 900; color: #FF1801;
      text-shadow: 0 0 40px #FF1801cc, 0 0 80px #ff000055;
      pointer-events: none; z-index: 7; letter-spacing: 10px;
      white-space: nowrap;
    }

    /* ── Crash / explosion ── */
    #crashFlash {
      display: none; position: absolute; inset: 0;
      pointer-events: none; z-index: 5; opacity: 0;
    }
    #crashMsg {
      display: none; position: absolute; inset: 0;
      flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; z-index: 6; opacity: 0;
    }
    .crash-title {
      font-size: 100px; font-weight: 900; color: #FF1801;
      text-shadow: 0 0 40px #FF1801cc, 0 0 80px #ff000055;
      letter-spacing: 10px;
    }
    .crash-sub {
      font-size: 22px; color: #fff; letter-spacing: 5px; margin-top: 22px;
      text-shadow: 0 0 12px #ffffffaa;
    }

    /* ── Version label ── */
    #version {
      position: absolute; top: 14px; left: 18px;
      color: rgba(255,255,255,.3); font-size: 11px;
      pointer-events: none; user-select: none; z-index: 7;
      letter-spacing: 1px;
    }

    /* ── Controls hint ── */
    #hint {
      display: none; position: absolute; bottom: 24px; left: 24px;
      color: rgba(255,255,255,.5); font-size: 12px; pointer-events: none; line-height: 1.9;
    }
    .k {
      display: inline-block; background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3); border-radius: 3px;
      padding: 1px 6px; margin: 1px;
    }

    /* ── Portrait-mode prompt (touch devices only) ── */
    #rotatePrompt {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,.95); color: #fff; z-index: 20;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; pointer-events: none;
    }
    @media (orientation: portrait) {
      body.touch #rotatePrompt { display: flex; }
    }

    /* ── Mobile touch controls ── */
    #mobileControls {
      display: none;
      position: absolute; inset: 0;
      pointer-events: none; z-index: 8;
    }
    .ctrl-zone {
      position: absolute; bottom: 24px;
      display: flex; gap: 12px;
      pointer-events: auto;
    }
    .ctrl-zone-left  { left: 24px;  flex-direction: column; align-items: center; }
    .ctrl-zone-right { right: 24px; flex-direction: row;    align-items: center; }
    .ctrl-btn {
      width: 80px; height: 80px;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.35);
      border-radius: 14px;
      color: #fff; font-size: 32px;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      touch-action: none; cursor: pointer;
      transition: background .08s, border-color .08s;
    }
    .ctrl-btn.active {
      background: rgba(255,24,1,.45);
      border-color: #FF1801;
    }

    /* On touch devices: lift HUD above controls, hide keyboard hint */
    body.touch #hud  { bottom: 120px; }
    body.touch #hint { display: none !important; }
  </style>
</head>
<body>

<div id="version">v1.0.8</div>

<!-- ── Start overlay ── -->
<div id="overlay">
  <h1>F1 RACE</h1>
  <p>START YOUR ENGINES</p>
  <button id="startBtn">&#9654; DRIVE</button>
  <small id="overlayHint">WASD / Arrow Keys &nbsp;·&nbsp; Requires click to unlock audio</small>
</div>

<!-- ── HUD ── -->
<div id="hud">
  <div id="livesRow"></div>
  <div id="gearNum">1</div>
  <div id="speedNum">0</div>
  <div id="speedUnit">KM/H</div>
  <div id="rpmTrack"><div id="rpmFill"></div></div>
  <div id="rpmLabel">RPM ──────────────── REDLINE</div>

</div>

<!-- ── Track switch notification ── -->

<!-- ── Crash effects ── -->

</div>

<!-- ── Controls hint ── -->

  <span class="k">W</span>/<span class="k">↑</span> Accelerate<br>
  <span class="k">S</span>/<span class="k">↓</span> Brake / Reverse<br>
  <span class="k">A</span>/<span class="k">←</span> <span class="k">D</span>/<span class="k">→</span> Steer
</div>

<!-- ── Portrait-mode prompt ── -->
<div id="rotatePrompt">
  <div style="font-size:72px;line-height:1;">&#8635;</div>
  <div style="font-size:20px;letter-spacing:4px;font-weight:700;">ROTATE DEVICE</div>
  <div style="font-size:13px;color:#777;letter-spacing:2px;">Landscape mode required</div>
</div>

<!-- ── Mobile touch controls ── -->
<div id="mobileControls">
  <div class="ctrl-zone ctrl-zone-left">
    <button class="ctrl-btn" id="btnFwd">&#9650;</button>
    <button class="ctrl-btn" id="btnBwd">&#9660;</button>
  </div>
  <div class="ctrl-zone ctrl-zone-right">
    <button class="ctrl-btn" id="btnLft">&#9664;</button>
    <button class="ctrl-btn" id="btnRgt">&#9654;</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════════════════
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 320, 950);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.45));

const sun = new THREE.DirectionalLight(0xfff0dd, 1.3);
sun.position.set(150, 250, 100);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -420;
sun.shadow.camera.right = sun.shadow.camera.top  =  420;
sun.shadow.camera.far = 900;
scene.add(sun);

// ═══════════════════════════════════════════════════════════════════
//  GROUND
// ═══════════════════════════════════════════════════════════════════
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshLambertMaterial({ color: 0x3e8c42 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ═══════════════════════════════════════════════════════════════════
//  TRACK
// ═══════════════════════════════════════════════════════════════════
const TRACK_W = 22;
const SAMPLES = 500;

const TRACK_NAMES = ['TRACK 1', 'TRACK 2', 'TRACK 3'];

const TRACK_LAYOUTS = [
  // Track 1 – original winding circuit
  [[0,0,0],[30,0,-50],[65,0,-105],[55,0,-170],[0,0,-215],[-65,0,-235],
   [-130,0,-210],[-170,0,-155],[-178,0,-80],[-155,0,-5],[-115,0,55],
   [-60,0,95],[-8,0,85],[22,0,42]],
  // Track 2 – fast open sweeper (Spa/Monza-style oval, no section overlap)
  [[0,0,0],[100,0,-15],[170,0,-80],[190,0,-190],[130,0,-300],[20,0,-350],
   [-60,0,-340],[-150,0,-290],[-190,0,-190],[-170,0,-80],[-100,0,-15]],
  // Track 3 – Hungaroring-style tight compact circuit
  [[0,0,0],[70,0,-15],[130,0,-65],[145,0,-150],[110,0,-220],
   [40,0,-260],[-40,0,-260],[-110,0,-220],[-145,0,-150],
   [-130,0,-65],[-70,0,-15]],
];

let tPts = [], tTangents = [], tNormals = [];

function computeTrackData(rawPts) {
  const vecs  = rawPts.map(p => new THREE.Vector3(...p));
  const curve = new THREE.CatmullRomCurve3(vecs, true, 'catmullrom', 0.5);
  const pts   = curve.getSpacedPoints(SAMPLES).slice(0, SAMPLES);
  const tangents = [], normals = [];
  for (let i = 0; i < pts.length; i++) {
    const n   = pts[(i + 1) % pts.length];
    const tan = new THREE.Vector3().subVectors(n, pts[i]).normalize();
    tangents.push(tan);
    normals.push(new THREE.Vector3(-tan.z, 0, tan.x));
  }
  return { pts, tangents, normals };
}

/* Build a flat ribbon mesh along a point list */
function ribbonMesh(pts, normals, halfW, color, yOff) {
  const verts = [], idx = [];
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i], n = normals[i];
    verts.push(
      p.x + n.x * halfW, yOff, p.z + n.z * halfW,
      p.x - n.x * halfW, yOff, p.z - n.z * halfW
    );
  }
  for (let i = 0; i < pts.length; i++) {
    const a = i * 2, b = a + 1;
    const c = ((i + 1) % pts.length) * 2, d = c + 1;
    idx.push(a, b, c, b, d, c);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo,
    new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide })
  );
  mesh.receiveShadow = true;
  return mesh;
}

function buildTrackGeometry(pts, tangents, normals) {
  const grp = new THREE.Group();

  grp.add(ribbonMesh(pts, normals, TRACK_W / 2,        0x2a2a2a, 0.02));
  grp.add(ribbonMesh(pts, normals, TRACK_W / 2 - 0.1,  0xffffff, 0.025));
  grp.add(ribbonMesh(pts, normals, TRACK_W / 2 - 1.4,  0x2a2a2a, 0.03));
  grp.add(ribbonMesh(pts, normals, 0.22,               0xffe040, 0.04));

  // ── Barriers ──
  const bGeo  = new THREE.BoxGeometry(0.9, 0.9, 2.4);
  const bMats = [0xdd2020, 0xffffff].map(c => new THREE.MeshLambertMaterial({ color: c }));
  const STEP = 5;
  for (const side of [1, -1]) {
    for (let i = 0; i < pts.length; i += STEP) {
      const p   = pts[i];
      const nor = normals[i];
      const tan = tangents[i];
      const pos = p.clone().addScaledVector(nor, side * (TRACK_W / 2 + 6.0));
      const m   = new THREE.Mesh(bGeo, bMats[Math.floor(i / STEP) % 2]);
      m.position.set(pos.x, 0.45, pos.z);
      m.lookAt(pos.x + tan.x, 0.45, pos.z + tan.z);
      m.castShadow = true;
      grp.add(m);
    }
  }

  // ── Start / Finish checkered line + gantry ──
  const COLS = 12;
  const colW = TRACK_W / COLS;
  const p0   = pts[0];
  const tan0 = tangents[0];
  const nor0 = normals[0];
  const rotY = -Math.atan2(tan0.x, tan0.z);

  for (let c = 0; c < COLS; c++) {
    const offset = (c - COLS / 2 + 0.5) * colW;
    const sq = new THREE.Mesh(
      new THREE.PlaneGeometry(colW, 2.5),
      new THREE.MeshLambertMaterial({ color: c % 2 === 0 ? 0x111111 : 0xffffff })
    );
    sq.rotation.x = -Math.PI / 2;
    sq.position.set(
      p0.x + nor0.x * offset + tan0.x,
      0.045,
      p0.z + nor0.z * offset + tan0.z
    );
    sq.rotation.y = rotY;
    grp.add(sq);
  }

  const POST_H  = 10;
  const HALF_SP = TRACK_W / 2 + 3.5;
  const SPAN    = HALF_SP * 2;
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const redMat   = new THREE.MeshLambertMaterial({ color: 0xFF1801 });
  const darkMat  = new THREE.MeshLambertMaterial({ color: 0x111111 });

  for (const side of [-1, 1]) {
    const px = p0.x + nor0.x * side * HALF_SP;
    const pz = p0.z + nor0.z * side * HALF_SP;
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.36, POST_H, 10), whiteMat);
    post.position.set(px, POST_H / 2, pz);
    post.castShadow = true;
    grp.add(post);
    const base = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.25, 1.4), darkMat);
    base.position.set(px, 0.12, pz);
    grp.add(base);
  }

  const bar = new THREE.Mesh(new THREE.BoxGeometry(SPAN + 0.6, 0.6, 0.6), whiteMat);
  bar.position.set(p0.x, POST_H, p0.z);
  bar.rotation.y = rotY;
  bar.castShadow = true;
  grp.add(bar);

  const BANNER_H = 2.2;
  const banner = new THREE.Mesh(new THREE.BoxGeometry(SPAN - 0.8, BANNER_H, 0.18), redMat);
  banner.position.set(p0.x, POST_H - BANNER_H / 2 - 0.3, p0.z);
  banner.rotation.y = rotY;
  banner.castShadow = true;
  grp.add(banner);

  const SEG_COUNT = 10;
  const SEG_W = (SPAN - 0.8) / SEG_COUNT;
  for (let i = 0; i < SEG_COUNT; i++) {
    if (i % 2 === 0) continue;
    const offset = (i - SEG_COUNT / 2 + 0.5) * SEG_W;
    const seg = new THREE.Mesh(new THREE.BoxGeometry(SEG_W - 0.05, BANNER_H - 0.1, 0.22), darkMat);
    seg.position.set(
      p0.x + nor0.x * offset,
      POST_H - BANNER_H / 2 - 0.3,
      p0.z + nor0.z * offset
    );
    seg.rotation.y = rotY;
    grp.add(seg);
  }

  return grp;
}

// ── Track state ──────────────────────────────────────────────────
let trackIndex = 0;
let trackGroup = null;
const trackNotifEl    = document.getElementById('trackNotif');
let   trackNotifTimer = 0;

function loadTrack(idx) {
  if (trackGroup) scene.remove(trackGroup);
  const { pts, tangents, normals } = computeTrackData(TRACK_LAYOUTS[idx % TRACK_LAYOUTS.length]);
  tPts.splice(0, tPts.length, ...pts);
  tTangents.splice(0, tTangents.length, ...tangents);
  tNormals.splice(0, tNormals.length, ...normals);
  trackGroup = buildTrackGeometry(tPts, tTangents, tNormals);
  scene.add(trackGroup);
}

// Build the first track so tPts / tTangents / tNormals are ready
loadTrack(0);

// ═══════════════════════════════════════════════════════════════════
//  ENVIRONMENT – trees + grandstand
// ═══════════════════════════════════════════════════════════════════
(function() {
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
  const leafMats = [0x2d6a24, 0x3a8230, 0x246b1e].map(c =>
    new THREE.MeshLambertMaterial({ color: c })
  );

  for (let i = 0; i < 240; i++) {
    const ang = Math.random() * Math.PI * 2;
    const r   = 420 + Math.random() * 280;
    const x   = Math.cos(ang) * r;
    const z   = Math.sin(ang) * r;
    const h   = 4 + Math.random() * 5;

    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.38, h, 6), trunkMat);
    trunk.position.set(x, h / 2, z);
    trunk.castShadow = true;
    scene.add(trunk);

    const leaf = new THREE.Mesh(
      new THREE.ConeGeometry(2 + Math.random() * 1.5, h * 0.95, 7),
      leafMats[i % 3]
    );
    leaf.position.set(x, h + h * 0.48 - 0.4, z);
    leaf.castShadow = true;
    scene.add(leaf);
  }

})();

// ═══════════════════════════════════════════════════════════════════
//  F1 CAR MODEL
// ═══════════════════════════════════════════════════════════════════
const RED    = 0xFF1801;
const DARK   = 0x111111;
const CARBON = 0x1e1e1e;
const GOLD   = 0xFFD700;
const SILVER = 0xaaaaaa;
const WHITE  = 0xffffff;

function mat(col) { return new THREE.MeshLambertMaterial({ color: col }); }

// ── Car Y constant used everywhere the car sits on the ground ────────
const CAR_Y = 0.15;

function buildCarSprite() {
  const W = 256, H = 512;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const cx = W / 2;

  // Cross-browser rounded rect fill
  function rr(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
    ctx.fill();
  }

  // y=0 = REAR, y=512 = FRONT (nose). Matches PlaneGeometry with rotation.x=-PI/2.

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rr(cx - 60 + 6, 40 + 6, 120, 420, 20);

  // ── Rear wing ───────────────────────────────────────────────────────
  ctx.fillStyle = '#dd2020';
  rr(cx - 96, 16, 192, 22, 4);   // upper plane
  rr(cx - 84, 36, 168, 14, 3);   // lower plane
  // Endplates
  ctx.fillStyle = '#191919';
  rr(cx - 100, 12, 14, 36, 3);
  rr(cx + 86,  12, 14, 36, 3);

  // ── Floor / base layer ──────────────────────────────────────────────
  ctx.fillStyle = '#111111';
  rr(cx - 54, 42, 108, 430, 20);

  // ── Sidepods ────────────────────────────────────────────────────────
  ctx.fillStyle = '#cc1212';
  rr(cx - 90, 100, 38, 170, 8);
  rr(cx + 52,  100, 38, 170, 8);
  // Intake scoops (dark)
  ctx.fillStyle = '#0a0a0a';
  rr(cx - 86, 165, 10, 30, 3);
  rr(cx + 76, 165, 10, 30, 3);

  // ── Top body ────────────────────────────────────────────────────────
  ctx.fillStyle = '#ee2020';
  rr(cx - 44, 55, 88, 400, 22);

  // Engine cover highlight
  ctx.fillStyle = '#cc0000';
  rr(cx - 28, 75, 56, 320, 12);

  // ── Wheels ──────────────────────────────────────────────────────────
  function wheel(wx, wy) {
    ctx.fillStyle = '#1a1a1a';
    rr(wx - 22, wy - 44, 44, 88, 7);   // tyre
    ctx.fillStyle = '#888888';
    rr(wx - 15, wy - 30, 30, 60, 5);   // rim
    ctx.fillStyle = '#444444';
    rr(wx - 5,  wy - 10, 10, 20, 3);   // centre
  }
  wheel(cx - 80, 110);  // rear-left
  wheel(cx + 80, 110);  // rear-right
  wheel(cx - 80, 400);  // front-left
  wheel(cx + 80, 400);  // front-right

  // ── Cockpit opening ─────────────────────────────────────────────────
  ctx.fillStyle = '#080808';
  rr(cx - 22, 195, 44, 95, 12);

  // ── Halo ────────────────────────────────────────────────────────────
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.ellipse(cx, 242, 26, 12, 0, Math.PI, 0);
  ctx.stroke();
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, 230);
  ctx.lineTo(cx, 270);
  ctx.stroke();

  // ── Front wing ──────────────────────────────────────────────────────
  ctx.fillStyle = '#dd2020';
  rr(cx - 112, 432, 224, 20, 4);  // main plane
  rr(cx - 94,  450, 188, 13, 3);  // second element
  // Endplates
  ctx.fillStyle = '#191919';
  rr(cx - 116, 428, 14, 36, 3);
  rr(cx + 102, 428, 14, 36, 3);

  // ── Nose ────────────────────────────────────────────────────────────
  ctx.fillStyle = '#dd2020';
  rr(cx - 20, 430, 40, 68, 8);
  // Nose tip
  ctx.fillStyle = '#cc1818';
  ctx.beginPath();
  ctx.moveTo(cx - 10, 494);
  ctx.lineTo(cx + 10, 494);
  ctx.lineTo(cx, 510);
  ctx.closePath();
  ctx.fill();

  // ── White centre stripe ─────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  rr(cx - 3, 85, 6, 325, 2);

  const tex = new THREE.CanvasTexture(cv);
  const spriteMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.05 });

  // Plane lies flat; local +Y → world -Z, so canvas bottom (y=H) → car FRONT (+Z). ✓
  const plane = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 5.5), spriteMat);
  plane.rotation.x = -Math.PI / 2;
  // Offset plane forward inside group so the sprite's visual midpoint aligns
  // with the car pivot (3D car spans z=-2.15..+3.05, midpoint ≈ +0.45 forward).
  // In the group's local space +Z is car-forward; plane local -Y → world +Z after rotation.
  // Shift plane.position.z = +0.45 so its visual centre lines up with the group origin.
  plane.position.z = 0.45;

  const group = new THREE.Group();
  group.add(plane);
  return group;
}

// ── 3D car model (buildCarSprite kept below as dead code) ─────────────
function buildF1Car() {
  const car = new THREE.Group();

  function box(w, h, d, col, x = 0, y = 0, z = 0) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(col));
    m.position.set(x, y, z); m.castShadow = m.receiveShadow = true;
    car.add(m); return m;
  }
  function cyl(rt, rb, h, segs, col, x = 0, y = 0, z = 0, rx = 0, rz = 0) {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs), mat(col));
    m.position.set(x, y, z); m.rotation.x = rx; m.rotation.z = rz;
    m.castShadow = true; car.add(m); return m;
  }

  // ── Chassis body ─────────────────────────────────────────────────
  box(1.55, 0.22, 3.9,  CARBON,  0,  0.28,  0);
  box(1.20, 0.11, 2.9,  RED,     0,  0.41, -0.1);

  // Nose
  box(0.52, 0.11, 1.25, RED,     0,  0.24,  2.15);
  const noseTip = new THREE.Mesh(new THREE.ConeGeometry(0.11, 0.55, 4), mat(RED));
  noseTip.rotation.x = Math.PI / 2;
  noseTip.position.set(0, 0.24, 3.05);
  noseTip.castShadow = true;
  car.add(noseTip);

  // ── Cockpit ───────────────────────────────────────────────────────
  box(0.62, 0.22, 0.74, RED,    0,  0.52,  0.28);
  box(0.42, 0.16, 0.62, DARK,   0,  0.57,  0.28); // opening

  // Halo
  box(0.04, 0.3,  0.04, SILVER, -0.31, 0.74, 0.0);
  box(0.04, 0.3,  0.04, SILVER,  0.31, 0.74, 0.0);
  box(0.66, 0.04, 0.04, SILVER,  0,    0.90, 0.08);

  // Driver helmet
  const helm = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 8), mat(RED));
  helm.position.set(0, 0.76, 0.27);
  helm.scale.set(1, 0.96, 1.1);
  helm.castShadow = true;
  car.add(helm);
  // Visor
  const visor = new THREE.Mesh(
    new THREE.SphereGeometry(0.185, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.38),
    new THREE.MeshLambertMaterial({ color: 0x000000, transparent: true, opacity: 0.85 })
  );
  visor.position.set(0, 0.76, 0.27);
  visor.rotation.x = -0.42;
  car.add(visor);

  // ── Sidepods ──────────────────────────────────────────────────────
  box(0.28, 0.20, 1.25, RED,  -0.84, 0.32,  0.1);
  box(0.28, 0.20, 1.25, RED,   0.84, 0.32,  0.1);
  box(0.08, 0.14, 0.08, DARK, -0.95, 0.37,  0.72); // inlet L
  box(0.08, 0.14, 0.08, DARK,  0.95, 0.37,  0.72); // inlet R

  // ── Floor / diffuser ──────────────────────────────────────────────
  box(1.48, 0.05, 3.6,  DARK,    0, 0.15,  0);
  box(1.20, 0.07, 0.55, CARBON,  0, 0.18, -2.15); // diffuser
  // Diffuser fins
  for (let i = -2; i <= 2; i++) {
    box(0.04, 0.14, 0.45, CARBON, i * 0.22, 0.23, -2.1);
  }

  // ── Front wing ────────────────────────────────────────────────────
  box(2.0,  0.055, 0.58, RED,    0, 0.165,  2.75);
  box(1.65, 0.038, 0.36, RED,    0, 0.215,  2.70);
  // Endplates
  box(0.04, 0.18,  0.60, RED,  -1.01, 0.21, 2.75);
  box(0.04, 0.18,  0.60, RED,   1.01, 0.21, 2.75);
  // Vanes
  box(0.04, 0.07,  0.36, GOLD, -0.68, 0.11, 2.72);
  box(0.04, 0.07,  0.36, GOLD,  0.68, 0.11, 2.72);

  // ── Rear wing ─────────────────────────────────────────────────────
  box(1.48, 0.065, 0.52, RED,    0, 0.95, -1.98);
  box(1.48, 0.065, 0.36, RED,    0, 0.78, -2.02);
  box(0.06, 0.46,  0.55, CARBON,-0.74, 0.82, -2.02); // endplate L
  box(0.06, 0.46,  0.55, CARBON, 0.74, 0.82, -2.02); // endplate R

  // Rear wing pylon
  box(0.08, 0.38, 0.08, RED, 0, 0.69, -2.02);

  // Exhaust
  cyl(0.055, 0.05, 0.28, 8, GOLD,  0.14, 0.43, -1.95, Math.PI / 2 * 0, 0);

  // ── Suspension arms ───────────────────────────────────────────────
  box(0.85, 0.035, 0.035, DARK, -0.58, 0.37, 1.8);
  box(0.85, 0.035, 0.035, DARK,  0.58, 0.37, 1.8);
  box(0.78, 0.035, 0.035, DARK, -0.58, 0.34, -1.38);
  box(0.78, 0.035, 0.035, DARK,  0.58, 0.34, -1.38);

  // ── Wheels ────────────────────────────────────────────────────────
  const WHEEL_R = 0.33;
  const WHEEL_W = 0.40;
  const RIM_R   = 0.22;

  const WHEEL_DEFS = [
    { x: -0.97, y: 0.33, z:  1.75, front: true  },
    { x:  0.97, y: 0.33, z:  1.75, front: true  },
    { x: -1.00, y: 0.33, z: -1.40, front: false },
    { x:  1.00, y: 0.33, z: -1.40, front: false },
  ];

  const wheels = [], frontWheels = [];

  WHEEL_DEFS.forEach(wd => {
    const steer = new THREE.Group();   // Yaw = steering angle
    const spin  = new THREE.Group();   // Roll rotation

    // Tyre
    const tyre = new THREE.Mesh(
      new THREE.CylinderGeometry(WHEEL_R, WHEEL_R, WHEEL_W, 20),
      mat(DARK)
    );
    tyre.rotation.z = Math.PI / 2;
    tyre.castShadow = true;
    spin.add(tyre);

    // Rim face
    const rim = new THREE.Mesh(
      new THREE.CylinderGeometry(RIM_R, RIM_R, WHEEL_W + 0.01, 20),
      mat(SILVER)
    );
    rim.rotation.z = Math.PI / 2;
    spin.add(rim);

    // Spokes (5, arranged in the tyre's YZ plane)
    for (let s = 0; s < 5; s++) {
      const spoke = new THREE.Mesh(
        new THREE.BoxGeometry(0.034, RIM_R * 1.85, 0.034),
        mat(SILVER)
      );
      spoke.rotation.x = (s / 5) * Math.PI * 2;
      spin.add(spoke);
    }

    steer.add(spin);
    steer.position.set(wd.x, wd.y, wd.z);
    car.add(steer);
    wheels.push({ steer, spin, front: wd.front });
    if (wd.front) frontWheels.push(steer);
  });

  return { car, wheels, frontWheels };
}

function bindCtrl(id, code) {
  const el = document.getElementById(id);
  const on  = e => {
    e.preventDefault();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  el.addEventListener('touchend',    off, { passive: false });

}

// ═══════════════════════════════════════════════════════════════════
//  CAR PHYSICS STATE
// ═══════════════════════════════════════════════════════════════════
let carSpeed = 0;
const MAX_FWD  = 1.25;
const MAX_REV  = 0.30;
const ACCEL    = 0.013;
const BRAKE    = 0.026;
const DRAG     = 0.0045;
const TURN     = 0.026;

// ── Collision & Explosion system ────────────────────────────────────
const CRASH_HALF   = TRACK_W / 2 + 5.5;
let carTrackIdx    = 0;
let prevTrackIdx   = 0;
let lapCount       = 0;
let carCrashed     = false;
let steerVisual    = 0;
let explosionTimer = 0;
const debrisPieces = [];
const firePieces   = [];
const crashFlashEl = document.getElementById('crashFlash');
const crashMsgEl   = document.getElementById('crashMsg');
const crashTitleEl = crashMsgEl.querySelector('.crash-title');
const livesRowEl   = document.getElementById('livesRow');

const MAX_LIVES = 3;
let lives = MAX_LIVES;
let crashTrackIdx = 0;

function renderLives() {
  livesRowEl.innerHTML = Array.from({ length: MAX_LIVES }, (_, i) =>
    `<span class="${i < lives ? 'life-full' : 'life-empty'}">&#9829;</span>`
  ).join('');
}

function findNearestTrackIdx() {
  const cx = carMesh.position.x, cz = carMesh.position.z;
  const N = tPts.length;
  let best = Infinity, bestI = carTrackIdx;
  for (let di = -50; di <= 50; di++) {
    const i = (carTrackIdx + di + N) % N;
    const dx = cx - tPts[i].x, dz = cz - tPts[i].z;
    const d2 = dx * dx + dz * dz;
    if (d2 < best) { best = d2; bestI = i; }
  }
  if (best > 400) {
    for (let i = 0; i < N; i++) {
      const dx = cx - tPts[i].x, dz = cz - tPts[i].z;
      const d2 = dx * dx + dz * dz;
      if (d2 < best) { best = d2; bestI = i; }
    }
  }
  carTrackIdx = bestI;
}

function lateralOffset(wx, wz, idx) {
  const nor = tNormals[idx];
  return (wx - tPts[idx].x) * nor.x + (wz - tPts[idx].z) * nor.z;
}

function spawnExplosion() {
  if (carCrashed) return;
  carCrashed = true;
  carMesh.visible = false;
  explosionTimer = 220;
  stopEngineAudio();
  playCrashSound();

  lives = Math.max(lives - 1, 0);
  renderLives();
  crashTrackIdx = carTrackIdx;

  if (lives === 0) {
    crashTitleEl.textContent = 'WASTED';
    document.getElementById('crashSub').textContent =
      isTouchDevice ? 'YOU LOST!  PRESS ANY BUTTON TO PLAY AGAIN' : 'YOU LOST!  PRESS ENTER TO PLAY AGAIN';
  } else {
    crashTitleEl.textContent = 'CRASHED!';
    document.getElementById('crashSub').textContent =
      isTouchDevice ? 'PRESS ANY BUTTON TO CONTINUE' : 'PRESS ENTER OR SPACE TO CONTINUE';
  }

  const cx = carMesh.position.x, cz = carMesh.position.z;

  // 16 debris shards in car colours
  const COLORS = [0xFF1801, 0xFF1801, 0xFF3300, 0x111111, 0x1e1e1e, 0xFFD700, 0xcccccc, 0x333333];
  for (let i = 0; i < 16; i++) {
    const w = 0.2 + Math.random() * 0.8, h = 0.1 + Math.random() * 0.35, d = 0.3 + Math.random() * 1.1;
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      new THREE.MeshLambertMaterial({ color: COLORS[i % COLORS.length] })
    );
    mesh.position.set(cx + (Math.random() - 0.5) * 1.5, 0.4, cz + (Math.random() - 0.5) * 1.5);
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    const ang = Math.random() * Math.PI * 2, spd = 0.14 + Math.random() * 0.28;
    debrisPieces.push({
      mesh,
      vx: Math.cos(ang) * spd + (Math.random() - 0.5) * 0.08,
      vy: 0.15 + Math.random() * 0.25,
      vz: Math.sin(ang) * spd + (Math.random() - 0.5) * 0.08,
      rx: (Math.random() - 0.5) * 0.2,
      ry: (Math.random() - 0.5) * 0.28,
      rz: (Math.random() - 0.5) * 0.2,
    });
    scene.add(mesh);
  }

  // 4 expanding fireballs: white core → yellow → orange → dark smoke
  for (const [color, maxS, spd] of [
    [0xffffff, 2.0, 0.22],
    [0xffee00, 4.5, 0.15],
    [0xff6600, 7.0, 0.10],
    [0x882200, 9.5, 0.065],
  ]) {
    const mat  = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 8), mat);
    mesh.position.set(cx, 1.2, cz);
    firePieces.push({ mesh, mat, maxS, spd });
    scene.add(mesh);
  }

  // White flash
  crashFlashEl.style.cssText = 'display:block;background:#ffffff;opacity:1;position:absolute;inset:0;pointer-events:none;z-index:5;';
}

function updateExplosion() {
  if (!carCrashed) return;
  if (explosionTimer > 0) explosionTimer--;

  // Debris with gravity and ground bounce
  for (const p of debrisPieces) {
    p.vy -= 0.009;
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    if (p.mesh.position.y < 0.05) {
      p.mesh.position.y = 0.05;
      p.vy *= -0.28; p.vx *= 0.75; p.vz *= 0.75;
    }
    p.mesh.rotation.x += p.rx;
    p.mesh.rotation.y += p.ry;
    p.mesh.rotation.z += p.rz;
  }

  // Fireballs expand then fade
  for (const f of firePieces) {
    if (f.mesh.scale.x < f.maxS) f.mesh.scale.setScalar(Math.min(f.mesh.scale.x + f.spd, f.maxS));
    f.mat.opacity = Math.max(0, 1 - (f.mesh.scale.x / f.maxS) * 1.1);
  }

  // White flash fades over first 15 frames
  if (explosionTimer > 205) {
    crashFlashEl.style.opacity = ((explosionTimer - 205) / 15).toFixed(2);
  } else if (explosionTimer === 204) {
    crashFlashEl.style.display = 'none';
  }

  // Restart prompt fades in after ~2 s
  if (explosionTimer === 100) {
    crashMsgEl.style.display = 'flex';
  }
  if (explosionTimer < 100 && explosionTimer > 0) {
    crashMsgEl.style.opacity = Math.min((100 - explosionTimer) / 25, 1).toFixed(2);
  }
}

function restartCar() {
  for (const p of debrisPieces) scene.remove(p.mesh);
  for (const f of firePieces)   scene.remove(f.mesh);
  debrisPieces.length = 0;
  firePieces.length   = 0;

  const isGameOver = lives === 0;
  if (isGameOver) {
    lives = MAX_LIVES;
    renderLives();
    lapCount = 0;
    elLap.textContent = 0;
    // Reset to track 1
    if (trackIndex !== 0) {
      trackIndex = 0;
      loadTrack(0);
    }
  }

  const spawnIdx = isGameOver ? 0 : crashTrackIdx;
  const sp = tPts[spawnIdx];
  carMesh.position.set(sp.x, CAR_Y, sp.z);
  carAngle = Math.atan2(tTangents[spawnIdx].x, tTangents[spawnIdx].z);
  carMesh.rotation.y = carAngle;
  carSpeed = 0;
  carMesh.visible = true;
  carCrashed  = false;
  carTrackIdx = spawnIdx;

  // Restore engine audio volume
  if (audioCtx) {
    masterGain.gain.setTargetAtTime(0.001, audioCtx.currentTime, 0.05);
  }

  crashMsgEl.style.display   = 'none';
  crashMsgEl.style.opacity   = '0';
  crashFlashEl.style.display = 'none';
}

function checkCollision() {
  if (carCrashed) return;

  findNearestTrackIdx();
  const sinA = Math.sin(carAngle), cosA = Math.cos(carAngle);
  const PROBE = 2.5;
  const points = [
    [carMesh.position.x,                carMesh.position.z],
    [carMesh.position.x + sinA * PROBE, carMesh.position.z + cosA * PROBE],
    [carMesh.position.x - sinA * PROBE, carMesh.position.z - cosA * PROBE],
  ];
  for (const [wx, wz] of points) {
    if (Math.abs(lateralOffset(wx, wz, carTrackIdx)) > CRASH_HALF) {
      spawnExplosion();
      return;
    }
  }
}

function updateCar() {
  if (carCrashed) return;
  const up    = keys['KeyW'] || keys['ArrowUp'];
  const down  = keys['KeyS'] || keys['ArrowDown'];
  const left  = keys['KeyA'] || keys['ArrowLeft'];
  const right = keys['KeyD'] || keys['ArrowRight'];

  // Speed
  if (up) {
    carSpeed = Math.min(carSpeed + ACCEL, MAX_FWD);
  } else if (down) {
    if (carSpeed > 0.005) carSpeed = Math.max(carSpeed - BRAKE, 0);
    else                  carSpeed = Math.max(carSpeed - ACCEL * 0.5, -MAX_REV);
  } else {
    carSpeed += carSpeed > 0 ? -DRAG : carSpeed < 0 ? DRAG : 0;
    if (Math.abs(carSpeed) < 0.001) carSpeed = 0;
  }

  // Steering (speed-proportional, reversed for reverse)
  const steerFactor = Math.min(Math.abs(carSpeed) / MAX_FWD, 1);
  const turnAmt = TURN * (steerFactor * 0.75 + 0.25) * Math.sign(carSpeed || 1);
  if (Math.abs(carSpeed) > 0.005) {
    if (left)  carAngle += turnAmt;
    if (right) carAngle -= turnAmt;
  }

  // Move
  carMesh.rotation.y = carAngle;
  carMesh.position.x += Math.sin(carAngle) * carSpeed;
  carMesh.position.z += Math.cos(carAngle) * carSpeed;

  // Wheel animation
  const targetSteer = left ? 0.32 : right ? -0.32 : 0;
  steerVisual += (targetSteer - steerVisual) * 0.18;
  for (const w of carWheels) {
    w.spin.rotation.x -= carSpeed * 3.5;
    if (w.front) w.steer.rotation.y = steerVisual;
  }

  checkCollision();

  // Lap detection: forward crossing of the start/finish line (idx 0)
  const N = tPts.length;
  if (prevTrackIdx > N - 40 && carTrackIdx < 40 && carSpeed > 0) {
    lapCount++;
    elLap.textContent = lapCount;

    if (lapCount >= 3) {
      lapCount = 0;
      elLap.textContent = 0;
      trackIndex++;
      loadTrack(trackIndex);
      // Teleport car to new track start
      carMesh.position.set(tPts[0].x, CAR_Y, tPts[0].z);
      carAngle = Math.atan2(tTangents[0].x, tTangents[0].z);
      carMesh.rotation.y = carAngle;
      carSpeed = 0;
      carTrackIdx = 0;
      prevTrackIdx = 0;
      // Show notification
      const name = TRACK_NAMES[trackIndex % TRACK_NAMES.length];
      trackNotifEl.textContent = name;
      trackNotifEl.style.display = 'block';
      trackNotifEl.style.opacity = '1';
      trackNotifTimer = 180;
    }
  }
  prevTrackIdx = carTrackIdx;
}

// ═══════════════════════════════════════════════════════════════════
//  CAMERA UPDATE
// ═══════════════════════════════════════════════════════════════════
const CAM_DIST   = 12;
const CAM_HEIGHT = 5.5;
const CAM_LERP   = 0.07;

function updateCamera() {
  const sinA = Math.sin(carMesh.rotation.y);
  const cosA = Math.cos(carMesh.rotation.y);
  const targetPos = new THREE.Vector3(
    carMesh.position.x - sinA * CAM_DIST,
    carMesh.position.y + CAM_HEIGHT,
    carMesh.position.z - cosA * CAM_DIST
  );
  camera.position.lerp(targetPos, CAM_LERP);

  const lookTarget = new THREE.Vector3(
    carMesh.position.x + sinA * 4,
    carMesh.position.y + 0.5,
    carMesh.position.z + cosA * 4
  );
  camLookAt.lerp(lookTarget, CAM_LERP * 1.8);
  camera.lookAt(camLookAt);
}

// ═══════════════════════════════════════════════════════════════════
//  AUDIO  (Web Audio API)
// ═══════════════════════════════════════════════════════════════════
let audioCtx = null;
let oscBody = null, oscDet = null, oscMid = null, oscScream = null;
let masterGain = null, noiseGain = null, popGain = null, screechGain = null;
let bpFilter = null;
let prevSpeed = 0;

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function unlockAudio() {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => {
        const silentBuf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
        const src = audioCtx.createBufferSource();
        src.buffer = silentBuf;
        src.connect(audioCtx.destination);
        src.start(0);
      });
    }
  }
  unlockAudio();
  document.addEventListener('touchstart', unlockAudio, { once: false, passive: true });

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.001;
  masterGain.connect(audioCtx.destination);

  // Hard-clip distortion — harsher mechanical crunch than soft clip
  const distortion = audioCtx.createWaveShaper();
  const dCurve = new Float32Array(512);
  const threshold = 0.35;
  for (let i = 0; i < 512; i++) {
    const x = (i * 2) / 512 - 1;
    dCurve[i] = x < -threshold ? -threshold * 2.2
              : x >  threshold ?  threshold * 2.2
              : x * 2.2;
  }
  distortion.curve = dCurve;
  distortion.oversample = '4x';
  distortion.connect(masterGain);

  // Resonant bandpass — sweeps from muffled idle to screaming redline
  bpFilter = audioCtx.createBiquadFilter();
  bpFilter.type = 'bandpass';
  bpFilter.frequency.value = 150;
  bpFilter.Q.value = 3.5;
  bpFilter.connect(distortion);

  // Second narrower bandpass for upper harmonic character
  const bp2 = audioCtx.createBiquadFilter();
  bp2.type = 'bandpass';
  bp2.frequency.value = 700;
  bp2.Q.value = 1.8;
  bp2.connect(distortion);

  // ── Three detuned oscillators — chorus thickness ──────────────────
  oscBody = audioCtx.createOscillator();
  oscBody.type = 'sawtooth';
  oscBody.frequency.value = 80;
  const g1 = audioCtx.createGain(); g1.gain.value = 0.7;
  oscBody.connect(g1); g1.connect(bpFilter);

  oscDet = audioCtx.createOscillator();   // slight detune for chorus
  oscDet.type = 'sawtooth';
  oscDet.frequency.value = 80.6;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.4;
  oscDet.connect(g2); g2.connect(bpFilter);

  oscMid = audioCtx.createOscillator();   // 2nd harmonic with slight detuning
  oscMid.type = 'sawtooth';
  oscMid.frequency.value = 163;
  const g3 = audioCtx.createGain(); g3.gain.value = 0.3;
  oscMid.connect(g3); g3.connect(bp2);

  // ── High scream (bypasses distortion for clean shriek) ───────────
  oscScream = audioCtx.createOscillator();
  oscScream.type = 'sawtooth';
  oscScream.frequency.value = 600;
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 900; hpf.Q.value = 1.2;
  screechGain = audioCtx.createGain(); screechGain.gain.value = 0;
  oscScream.connect(hpf); hpf.connect(screechGain); screechGain.connect(masterGain);

  // ── Tyre/wind noise ───────────────────────────────────────────────
  const nLen = audioCtx.sampleRate * 2;
  const nBuf = audioCtx.createBuffer(1, nLen, audioCtx.sampleRate);
  const nData = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nData[i] = Math.random() * 2 - 1;
  const nSrc = audioCtx.createBufferSource();
  nSrc.buffer = nBuf; nSrc.loop = true;
  const nBPF = audioCtx.createBiquadFilter();
  nBPF.type = 'bandpass'; nBPF.frequency.value = 2200; nBPF.Q.value = 0.6;
  noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
  nSrc.connect(nBPF); nBPF.connect(noiseGain); noiseGain.connect(masterGain);
  nSrc.start();

  // ── Exhaust crackle — sparse impulse noise on lift-off ───────────
  const pLen = audioCtx.sampleRate * 2;
  const pBuf = audioCtx.createBuffer(1, pLen, audioCtx.sampleRate);
  const pData = pBuf.getChannelData(0);
  for (let i = 0; i < pLen; i++) {
    pData[i] = Math.random() < 0.018 ? (Math.random() * 2 - 1) * 3.5 : 0;
  }
  const pSrc = audioCtx.createBufferSource();
  pSrc.buffer = pBuf; pSrc.loop = true;
  const pBPF = audioCtx.createBiquadFilter();
  pBPF.type = 'bandpass'; pBPF.frequency.value = 350; pBPF.Q.value = 1.0;
  popGain = audioCtx.createGain(); popGain.gain.value = 0;
  pSrc.connect(pBPF); pBPF.connect(popGain); popGain.connect(masterGain);
  pSrc.start();

  oscBody.start(); oscDet.start(); oscMid.start(); oscScream.start();
}

function updateAudio() {
  if (!audioCtx || carCrashed) return;
  const t = audioCtx.currentTime;
  const r = Math.abs(carSpeed) / MAX_FWD;   // 0 → 1

  // Engine frequency: 45 Hz at idle, 290 Hz at redline
  const f = 45 + r * 245;
  const S = 0.04;
  oscBody.frequency.setTargetAtTime(f,          t, S);
  oscDet.frequency.setTargetAtTime(f * 1.0075,  t, S);
  oscMid.frequency.setTargetAtTime(f * 2.015,   t, S);
  oscScream.frequency.setTargetAtTime(f * 5.1 + r * 180, t, S);

  // Master volume swells with speed
  masterGain.gain.setTargetAtTime(0.04 + r * 0.26, t, 0.05);

  // Resonant bandpass sweeps open — the key character of the F1 scream
  bpFilter.frequency.setTargetAtTime(110 + r * 2600, t, 0.06);
  bpFilter.Q.setTargetAtTime(3.8 - r * 1.8, t, 0.06);   // Q tightens at idle, opens at redline

  // Scream overtone kicks in above 55% speed
  const scream = Math.max(0, (r - 0.55) / 0.45);
  screechGain.gain.setTargetAtTime(scream * 0.20, t, 0.06);

  // Tyre noise proportional to speed
  noiseGain.gain.setTargetAtTime(r * 0.055, t, 0.1);

  // Exhaust crackle on sharp deceleration from medium+ speed
  const accel = carSpeed - prevSpeed;
  const pop = (accel < -0.004 && r > 0.15) ? Math.min(-accel * 28, 0.35) : 0;
  popGain.gain.setTargetAtTime(pop, t, 0.025);

  prevSpeed = carSpeed;
}

function stopEngineAudio() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setTargetAtTime(0, t, 0.12);
  noiseGain.gain.cancelScheduledValues(t);
  noiseGain.gain.setTargetAtTime(0, t, 0.08);
  screechGain.gain.cancelScheduledValues(t);
  screechGain.gain.setTargetAtTime(0, t, 0.08);
  popGain.gain.cancelScheduledValues(t);
  popGain.gain.setTargetAtTime(0, t, 0.04);
}

function playCrashSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Low boom: short sine swept down
  const boom = audioCtx.createOscillator();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(120, t);
  boom.frequency.exponentialRampToValueAtTime(30, t + 0.35);
  const boomGain = audioCtx.createGain();
  boomGain.gain.setValueAtTime(1.2, t);
  boomGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  boom.connect(boomGain);
  boomGain.connect(audioCtx.destination);
  boom.start(t);
  boom.stop(t + 0.5);

  // Metal crunch burst: short noise hit
  const bufLen = audioCtx.sampleRate * 0.4;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.5);
  const crunch = audioCtx.createBufferSource();
  crunch.buffer = buf;
  const crunchFilter = audioCtx.createBiquadFilter();
  crunchFilter.type = 'bandpass';
  crunchFilter.frequency.value = 800;
  crunchFilter.Q.value = 0.5;
  const crunchGain = audioCtx.createGain();
  crunchGain.gain.setValueAtTime(2.5, t);
  crunchGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  crunch.connect(crunchFilter);
  crunchFilter.connect(crunchGain);
  crunchGain.connect(audioCtx.destination);
  crunch.start(t);
}

// ═══════════════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════════════
const elGear  = document.getElementById('gearNum');
const elSpeed = document.getElementById('speedNum');
const elRpm   = document.getElementById('rpmFill');
const elLap   = document.getElementById('lapNum');

const GEAR_RATIOS = [0, 0.11, 0.24, 0.40, 0.58, 0.77, 1.0];

function updateHUD() {
  const r      = Math.abs(carSpeed) / MAX_FWD;
  const kmh    = Math.round(r * 295);
  elSpeed.textContent = kmh;

  let gear = 1;
  for (let i = 0; i < GEAR_RATIOS.length; i++) {
    if (r >= GEAR_RATIOS[i]) gear = i + 1;
  }
  elGear.textContent = carSpeed < -0.01 ? 'R' : gear;
  elRpm.style.width  = Math.min(r * 100, 100) + '%';
}

// ═══════════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════════
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouchDevice) {
  document.body.classList.add('touch');
  document.getElementById('overlayHint').textContent = 'Touch controls · Tap to unlock audio';
}

let gameActive = false;

document.getElementById('startBtn').addEventListener('click', () => {
  gameActive = true;
  initAudio();
  lives = MAX_LIVES;
  renderLives();
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('hud').style.display     = 'block';
  if (isTouchDevice) {
    document.getElementById('mobileControls').style.display = 'block';
  } else {
    document.getElementById('hint').style.display = 'block';
  }
});

// ═══════════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  if (gameActive) {
    updateCar();
    updateAudio();
    updateHUD();
    updateExplosion();
  }
  if (trackNotifTimer > 0) {
    trackNotifTimer--;
    if (trackNotifTimer < 60) trackNotifEl.style.opacity = (trackNotifTimer / 60).toFixed(2);
    if (trackNotifTimer === 0) trackNotifEl.style.display = 'none';
  }
  updateCamera();
  renderer.render(scene, camera);
}

animate();
</script>
